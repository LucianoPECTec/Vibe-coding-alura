<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEC - Mapa de Visitas (Rio Preto)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="masthead">
        <div class="masthead-brand">
            <span class="brand-sigla">PEC</span>
            <div class="brand-texts">
                <span class="brand-title">Tecnologia · Rio Preto</span>
                <span class="brand-sub">Mapa de Visitas</span>
            </div>
        </div>
        <nav class="nav-tabs">
            <button class="nav-tab active" id="tab-ure" onclick="mudarAba('ure')">URE <span class="tab-badge" id="badge-ure">0</span></button>
            <button class="nav-tab" id="tab-escola" onclick="mudarAba('escola')">Escola <span class="tab-badge" id="badge-escola">0</span></button>
            <button class="nav-tab" id="tab-turma" onclick="mudarAba('turma')">Turmas <span class="tab-badge" id="badge-turma">0</span></button>
            <button class="nav-tab" id="tab-mapa" onclick="mudarAba('mapa')">📍 Mapa</button>
            <button class="nav-tab" id="tab-comparativo" onclick="mudarAba('comparativo')">Comparativo</button>
        </nav>
        <div class="sb-status" onclick="abrirModalSupabase()">
            <div id="sb-dot" class="sb-dot"></div>
            <span id="sb-lbl" class="sb-lbl">Supabase</span>
        </div>
    </header>

    <main class="page">
        <section id="panel-ure" class="tab-panel active">
            <div class="upload-hero">
                <div><h1 class="hero-h1">Nível <em>URE</em></h1><p class="hero-desc">Importe o relatório consolidado da Diretoria.</p></div>
                <div class="upload-card">📊<br>Relatório URE<input type="file" id="input-ure" accept=".xlsx, .xls, .csv"></div>
            </div>
            <div id="results-ure" style="display:none">
                <div id="strip-ure" class="score-strip"></div>
                <div class="table-outer"><table><thead><tr id="head-ure"></tr></thead><tbody id="body-ure"></tbody></table></div>
            </div>
        </section>

        <section id="panel-escola" class="tab-panel">
            <div class="upload-hero">
                <div><h1 class="hero-h1">Nível <em>Escola</em></h1></div>
                <div class="upload-card">🏫<br>Relatório Escola<input type="file" id="input-escola" accept=".xlsx, .xls, .csv"></div>
            </div>
            <div id="results-escola" style="display:none">
                <div id="strip-escola" class="score-strip"></div>
                <div class="table-outer"><table><thead><tr id="head-escola"></tr></thead><tbody id="body-escola"></tbody></table></div>
            </div>
        </section>

        <section id="panel-turma" class="tab-panel">
            <div class="upload-hero">
                <div><h1 class="hero-h1">Nível <em>Turmas</em></h1></div>
                <div class="upload-card">👨‍🎓<br>Relatório Turma<input type="file" id="input-turma" accept=".xlsx, .xls, .csv"></div>
            </div>
            <div id="results-turma" style="display:none">
                <div id="strip-turma" class="score-strip"></div>
                <div class="table-outer"><table><thead><tr id="head-turma"></tr></thead><tbody id="body-turma"></tbody></table></div>
            </div>
        </section>

        <section id="panel-mapa" class="tab-panel">
            <h1 class="hero-h1">Geolocalização <em>Prioritária</em></h1>
            <div id="map" style="width:100%; height:600px; margin-top:20px; border-radius:15px; border:1px solid #ddd;"></div>
        </section>

        <section id="panel-comparativo" class="tab-panel">
            <h1 class="hero-h1">Evolução <em>Histórica</em></h1>
            <div class="charts-grid"><div class="chart-card full"><canvas id="chart-evolucao"></canvas></div></div>
        </section>
    </main>

    <div id="modal-sb" class="modal-overlay">
        <div class="modal">
            <div class="modal-head"><h3>CONFIGURAR SUPABASE</h3><button onclick="fecharModal()">×</button></div>
            <div class="modal-body">
                <input type="text" id="inp-url" class="field-input" placeholder="URL do Projeto">
                <input type="password" id="inp-key" class="field-input" placeholder="Chave de API">
                <div class="modal-actions">
                    <button class="btn" onclick="testarConexao()">🔌 TESTAR</button>
                    <button class="btn btn-accent" onclick="salvarConfig()">💾 SALVAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&callback=initMap" async defer></script>
    <script src="script.js"></script>
</body>
</html>
